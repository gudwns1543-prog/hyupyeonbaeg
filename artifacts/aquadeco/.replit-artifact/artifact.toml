kind = "web"
previewPath = "/"
title = "AquaDeco 홈페이지"
version = "1.0.0"
id = "artifacts/aquadeco"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21531

[services.development]
run = "pnpm --filter @workspace/aquadeco run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aquadeco", "run", "build" ]
publicDir = "artifacts/aquadeco/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21531"
BASE_PATH = "/"
